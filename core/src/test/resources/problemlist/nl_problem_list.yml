# NL Problem List extension - adds nesting condition logic and narrative text to Composition section
grammar: FHIRConnect/v0.0.1
type: extension
metadata:
  name: NL_problem_list
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  extends: COMPOSITION.problem_list.v2
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/uv/ips/StructureDefinition/Composition-uv-ips

mappings:
  - name: "sectionActiveProblems"
    extension: "overwrite"
    with:
      fhir: "$resource.section"
      openehr: "$composition"
    followedBy:
      mappings:
        - name: "entry"
          with:
            fhir: "entry"
            openehr: "$reference"
          reference:
            resourceType: "Condition"
            mappings:
              - name: "problemDiagnosis"
                with:
                  fhir: "$fhirRoot"
                  openehr: "$composition/content[openEHR-EHR-EVALUATION.problem_diagnosis.v1]"
                slotArchetype: "EVALUATION.problem_diagnosis.v1"
        - name: "title"
          with:
            fhir: "$fhirRoot"
            openehr: "$composition"
          manual:
            - name: "manualTitle"
              fhir:
                - path: "title"
                  value: "Active Problems"
        - name: "code"
          with:
            fhir: "code.coding"
            openehr: "$composition"
          manual:
            - name: "manualSystem"
              fhir:
                - path: "system"
                  value: "http://loinc.org"
            - name: "manualCode"
              fhir:
                - path: "code"
                  value: "11450-4"
            - name: "manualDisplay"
              fhir:
                - path: "display"
                  value: "Problem list Reported"
        - name: "narrativeText"
          with:
            fhir: "text"
            openehr: "$composition"
          manual:
            - name: "status"
              fhir:
                - path: "status"
                  value: "generated"
            - name: "div"
              fhir:
                - path: "div"
                  value: "<div xmlns=\"http://www.w3.org/1999/xhtml\">Hot flushes</div>"
