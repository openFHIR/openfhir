# Laboratory test analyte cluster model - maps FHIR Observation to openEHR lab analyte
# Used when Observation is referenced (e.g. Condition.evidence.detail, DiagnosticReport.result)
grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: CLUSTER.laboratory_test_analyte.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.laboratory_test_analyte.v1
    revision: 1.1.8
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/BackboneElement

mappings:
  - name: "status"
    with:
      fhir: "$resource"
      openehr: "$archetype/items[at0005]" # Result status
    manual:
      - name: "statusFinal"
        fhir:
          - path: "status"
            value: "final"
        openehrCondition:
          targetRoot: "$archetype"
          targetAttribute: "items[at0005]/defining_code/code_string"
          operator: "one of"
          criteria: "at0018"

  - name: "issued"
    with:
      fhir: "$resource.issued"
      openehr: "$archetype/items[at0006]" # Result status time

  - name: "analyteMeasurement"
    with:
      fhir: "$resource.value"
      openehr: "$archetype/items[at0001]" # Analyte result

  - name: "analyteName"
    with:
      fhir: "$resource.code"
      openehr: "$archetype/items[at0024]" # Analyte name

  - name: "referenceRangeGuidance"
    with:
      fhir: "$resource.referenceRange.text"
      openehr: "$archetype/items[at0004]" # Reference range guidance

  - name: "comment"
    with:
      fhir: "$resource.note.text"
      openehr: "$archetype/items[at0003]" # Comment (OPT: Observation.note)
