# Full problem_diagnosis model - used in Update Model Problem_Diagnosis
grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: EVALUATION.problem_diagnosis.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-EVALUATION.problem_diagnosis.v1
    revision: 1.4.1
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Condition

preprocessor:
  fhirCondition:
    targetRoot: "$resource.verificationStatus"
    targetAttribute: "coding.code"
    operator: "not of"
    criterias:
      - "entered-in-error"
      - "refuted"

mappings:
  - name: "contextStartTime"
    with:
      fhir: "$resource.recordedDate"
      openehr: "$composition/context/start_time"

  - name: "participations"
    with:
      fhir: "$resource.asserter"
      openehr: "$composition/context/participations"
      type: "NONE"
    followedBy:
      mappings:
        - name: "participationFunction"
          with:
            fhir: "$fhirRoot"
            openehr: "$openehrRoot"
          manual:
            - name: "function"
              openehr:
                - path: "function"
                  value: "asserter"
        - name: "performer"
          with:
            fhir: "$fhirRoot"
            openehr: "$openehrRoot/performer"

  - name: "composer"
    with:
      fhir: "$resource.recorder"
      openehr: "$composition/composer"

  - name: "other_participations"
    with:
      fhir: "$resource.asserter"
      openehr: "$archetype/other_participations"
      type: "NONE"
    followedBy:
      mappings:
        - name: "participationFunction"
          with:
            fhir: "$fhirRoot"
            openehr: "$openehrRoot"
          manual:
            - name: "function"
              openehr:
                - path: "function"
                  value: "asserter"
        - name: "performer"
          with:
            fhir: "$fhirRoot"
            openehr: "performer"

  - name: "provider"
    with:
      fhir: "$resource.recorder"
      openehr: "$archetype/provider"

  - name: "problemDiagnose"
    with:
      fhir: "$resource.code"
      openehr: "$archetype/data[at0001]/items[at0002]"

  - name: "verificationStatus"
    with:
      fhir: "$resource.verificationStatus"
      openehr: "$archetype/data[at0001]/items[at0073]"

  - name: "clinicalStatusSlot"
    with:
      fhir: "$resource"
      openehr: "$archetype/data[at0001]/items[openEHR-EHR-CLUSTER.problem_qualifier.v2]"
    slotArchetype: "CLUSTER.problem_qualifier.v2"

  - name: "note"
    with:
      fhir: "$resource.note.text"
      openehr: "$archetype/data[at0001]/items[at0069]"

  - name: "dateTime"
    with:
      fhir: "$resource.onset"
      openehr: "$archetype/data[at0001]/items[at0077]"

  - name: "bodySiteCluster"
    with:
      fhir: "$resource.bodySite"
      openehr: "$archetype/data[at0001]/items[openEHR-EHR-CLUSTER.anatomical_location.v1]"
    slotArchetype: "CLUSTER.anatomical_location.v1"

  - name: "severity"
    with:
      fhir: "$resource.severity"
      openehr: "$archetype/data[at0001]/items[at0005]"

