grammar: FHIRConnect/v0.0.1
type: model
metadata:
  name: OBSERVATION.blood_pressure.v2
  version: 0.0.1a
spec:
  system: FHIR
  version: STU3
  openEhrConfig:
    archetype: openEHR-EHR-OBSERVATION.blood_pressure.v2
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Observation

preprocessor:
  hierarchy:
    with:
      fhir: "$resource"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]"
    split:
      fhir:
        create: "resource"

mappings:
  - name: "systolic"
    with:
      fhir: "$resource.component"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding.code"
      operator: "one of"
      criteria: "8480-6"
    followedBy:
      mappings:
        - name: "value"
          with:
            fhir: "value"
            openehr: "items[at0004]"
        - name: "loincCode"
          with:
            fhir: "$fhirRoot"
            openehr: "$archetype"
          manual:
            - name: "loincCodeManual"
              fhir:
                - path: "code.coding.code"
                  value: "8480-6"

  - name: "diastolic"
    with:
      fhir: "$resource.component"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding.code"
      operator: "one of"
      criteria: "8462-4"
    followedBy:
      mappings:
        - name: "value"
          with:
            fhir: "value"
            openehr: "items[at0005]"
        - name: "loincCode"
          with:
            fhir: "$fhirRoot"
            openehr: "$archetype"
          manual:
            - name: "loincCodeManual"
              fhir:
                - path: "code.coding.code"
                  value: "8462-4"

  # STU3-only: Observation.related was removed in R4.
  # Maps the display text of the first related observation reference to the
  # blood pressure comment field (at0033).
  - name: "relatedDisplay"
    with:
      fhir: "$resource.related.target.display"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]/items[at0033]"
