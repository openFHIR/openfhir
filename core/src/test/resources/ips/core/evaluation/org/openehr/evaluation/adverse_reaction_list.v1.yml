grammar: FHIRConnect/v0.9.0
type: model
metadata:
  name: EVALUATION.adverse_reaction_risk.v2
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-EVALUATION.adverse_reaction_risk.v2
    revision: 1.4.1
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/AllergyIntolerance

mappings:
  - name: "substance"
    with:
      fhir: "$resource.code"
      openehr: "$archetype/data[at0001]/items[at0002]"

  - name: "activeInactive"
    with:
      fhir: "$resource.clinicalStatus"
      openehr: "$archetype"
    followedBy:
      mappings:
        - name: "activeInactiveAllergies"
          with:
            fhir: "coding"
            openehr: "data[at0001]/items[at0130]"
            type: "NONE"
          manual:
            - name: "active"
              openehr:
                - path: "defining_code/terminology_id"
                  value: "local"
                - path: "defining_code/code_string"
                  value: "at0131"
                - path: "value"
                  value: "Active"
              fhirCondition:
                targetRoot: "coding"
                targetAttribute: "code"
                operator: "one of"
                criteria: "active"
              fhir:
                - path: "code"
                  value: "active"
                - path: "system"
                  value: "http://terminology.hl7.org/CodeSystem/allergyintolerance-clinical"
                - path: "display"
                  value: "Active"
              openehrCondition:
                targetRoot: "$archetype/data[at0001]/items[at0130]"
                targetAttribute: "defining_code/code_string"
                operator: "one of"
                criteria: "at0131"

            - name: "inactive"
              openehr:
                - path: "defining_code/terminology_id"
                  value: "local"
                - path: "defining_code/code_string"
                  value: "at0132"
                - path: "value"
                  value: "Inactive"
              fhirCondition:
                targetRoot: "coding"
                targetAttribute: "code"
                operator: "one of"
                criteria: "inactive"
              fhir:
                - path: "code"
                  value: "inactive"
                - path: "system"
                  value: "http://terminology.hl7.org/CodeSystem/allergyintolerance-clinical"
                - path: "display"
                  value: "Inactive"
              openehrCondition:
                targetRoot: "$archetype/data[at0001]/items[at0130]"
                targetAttribute: "defining_code/code_string"
                operator: "one of"
                criteria: "at0132"