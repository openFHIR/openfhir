grammar: FHIRConnect/v0.9.0
type: model
metadata:
  name:  EVALUATION.absence.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-EVALUATION.absence.v2
    revision: 1.1.1
  fhirConfig:
    structureDefinition: "http://hl7.org/fhir/StructureDefinition/CodeableConcept"

mappings:

  - name: "text"
    with:
      fhir: "text"
      openehr: "data[at0001]/items[at0002]"

  - name: "coding"
    with:
      fhir: "coding"
      openehr: "$archetype"
    followedBy:
      mappings:
        - name: "code"
          manual:
            - name: "codeManual"
              fhir:
                - path: "code"
                  value: "unavailable"

        - name: "system"
          manual:
            - name: "systemManual"
              fhir:
                - path: "system"
                  value: "http://terminology.hl7.org/CodeSystem/list-empty-reason"

        - name: "display"
          with:
            fhir: "display"
            openehr: "$archetype/data[at0001]/items[at0005]"
