# Clinical evidence cluster model - used as slot in problem_diagnosis
# Maps FHIR Condition.evidence (BackboneElement) to openEHR clinical_evidence cluster
grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: CLUSTER.clinical_evidence.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.clinical_evidence.v1
    revision: 1.0.0
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/BackboneElement

mappings:
  - name: "evidenceCode"
    with:
      fhir: "$resource.code"
      openehr: "$archetype/items[at0005]"
