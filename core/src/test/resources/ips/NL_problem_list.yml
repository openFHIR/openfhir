grammar: FHIRConnect/v0.0.1
type: extension
metadata:
  name: NL_problem_list
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  extends: COMPOSITION.problem_list.v2
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Composition

mappings:
  - name: "narrativeText"
    extension: "add"
    with:
      fhir: "$resource.section.text"
      openehr: "$archetype"
    manual:
      - name: "title"
        fhir:
          - path: "status"
            value: "generated"