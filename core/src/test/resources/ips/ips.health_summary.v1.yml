# Problem list composition model - used in Update Model Problem List
grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: COMPOSITION.health_summary.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-COMPOSITION.health_summary.v1
    revision: 1.0.3
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Composition

mappings:
  - name: meta
    with:
      fhir: "$resource.meta"
      openehr: "$composition"
    manual:
      - name: "profile"
        fhir:
          - path: "profile"
            value: "http://hl7.org/fhir/uv/ips/StructureDefinition/Composition-uv-ips"

  - name: title
    with:
      fhir: "$resource"
      openehr: "$composition"
    manual:
      - name: "title"
        fhir:
          - path: "title"
            value: "Patient Summary"

  - name: status
    with:
      fhir: "$resource"
      openehr: "$composition"
    manual:
      - name: "status"
        fhir:
          - path: "status"
            value: "final"

  - name: type
    with:
      fhir: "$resource.type.coding"
      openehr: "$composition"
    manual:
      - name: "code"
        fhir:
          - path: "code"
            value: "60591-5"
      - name: "system"
        fhir:
          - path: "system"
            value: "http://loinc.org"
      - name: "display"
        fhir:
          - path: "display"
            value: "Patient summary Document"

  - name: "sectionActiveProblems"
    with:
      fhir: "$resource.section"
      openehr: "$composition/content[openEHR-EHR-SECTION.adhoc.v1 and name/value='Problem List']"
    slotArchetype: "SECTION.adhoc.v1_problem_list"
    fhirCondition:
      targetRoot: "$resource.section"
      targetAttribute: "code.coding.code"
      operator: "one of"
      criteria: "11450-4"


  - name: "sectionAllergiesAndIntolerances"
    with:
      fhir: "$resource.section"
      openehr: "$composition/content[openEHR-EHR-SECTION.adhoc.v1 and name/value='Allergies and Intolerances']"
    slotArchetype: "SECTION.adhoc.v1_adverse_reaction_list"
    fhirCondition:
      targetRoot: "$resource.section"
      targetAttribute: "code.coding.code"
      operator: "one of"
      criteria: "48765-2"


  - name: "sectionMedications"
    with:
      fhir: "$resource.section"
      openehr: "$composition/content[openEHR-EHR-SECTION.adhoc.v1 and name/value='Medication list']"
    slotArchetype: "SECTION.adhoc.v1_medication_list"
    fhirCondition:
      targetRoot: "$resource.section"
      targetAttribute: "code.coding.code"
      operator: "one of"
      criteria: "10160-0"
