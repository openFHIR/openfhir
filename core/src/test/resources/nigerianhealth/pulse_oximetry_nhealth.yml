grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: "OBSERVATION.pulse_oximetry.v1-nhealth"
  version: 0.0.1a 
spec: 
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: "openEHR-EHR-OBSERVATION.pulse_oximetry.v1"
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Observation

preprocessor:
  fhirConditions:
    - targetRoot: "$resource"
      targetAttribute: "code.coding.code"
      operator: "one of"
      criteria: "2708-6" # saturation

mappings:
  - name: "value"
    with:
      fhir: "$resource.value"
      openehr: "$archetype/data[at0001]/events[at0002]/data[at0003]/items[at0006]"

  - name: "time"
    with:
      fhir: "$resource.effective"
      openehr: "$archetype/data[at0001]/events[at0002]/time"

  - name: "category"
    with:
      fhir: "$resource.category.coding"
    manual:
      - name: "vitalSigns"
        fhir:
          - path: "code"
            value: "vital-signs"
          - path: "display"
            value: "Vital Signs"
          - path: "system"
            value: "http://terminology.hl7.org/CodeSystem/observation-category"

  - name: "code"
    with:
      fhir: "$resource.code.coding"
    manual:
      - name: "saturationLoinc"
        fhir:
          - path: "code"
            value: "2708-6"
          - path: "display"
            value: "Oxygen saturation"
          - path: "system"
            value: "http://loinc.org"

  - name: "status"
    with:
      fhir: "$resource"
    manual:
      - name: "finalStatus"
        fhir:
          - path: "status"
            value: "final"
