grammar: FHIRConnect/v0.0.1
type: model
metadata:
  name: "OBSERVATION.head_circumference.v1"
  version: 0.0.1a # version of this particular mapping
spec: # schema specific to the FHIRConnect v0.0.1 engine
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: "openEHR-EHR-OBSERVATION.head_circumference.v1"
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Observation

preprocessor:
  hierarchy:
    with:
      fhir: "$resource"
      openehr: "$archetype/data[at0001]/events[at0010]"
    split:
      fhir:
        create: "resource"

  fhirConditions:
    - targetRoot: "$resource"
      targetAttribute: "category.coding.code"
      operator: "one of"
      criteria: "head_circumference"

    - targetRoot: "$resource"
      targetAttribute: "status"
      operator: "one of"
      criteria: "final"

mappings:

  - name: "headCircumference"
    with:
      fhir: "$resource.value"
      openehr: "$archetype/data[at0001]/events[at0010]/data[at0003]/items[at0004]"

  - name: "category"
    with:
      fhir: "$resource.category.coding"
      openehr: "$archetype"
    manual:
      - name: "hciCategory"
        fhir:
          - path: "code"
            value: "head_circumference"

  - name: "time"
    with:
      fhir: "$resource.effective"
      openehr: "$archetype/data[at0001]/events[at0010]/time"
  - name: "status"
    unidirectional: "openehr->fhir"
    with:
      fhir: "$resource"
      openehr: "$archetype"
    manual:
      - name: "status"
        fhir:
          - path: "status"
            value: "final"

  - name: "code"
    unidirectional: "openehr->fhir"
    with:
      fhir: "$resource.code.coding"
      openehr: "$archetype"
    manual:
      - name: "code"
        fhir:
          - path: "code"
            value: "8287-5"
      