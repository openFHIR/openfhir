grammar: FHIRConnect/v0.9.0
type: model
metadata:
  name:  CLUSTER.timing_daily.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.timing_daily.v1
    revision: 2.0.2
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Dosage

mappings:

  - name: "dosageTiming"
    with:
      fhir: "$fhirRoot.timing.repeat"
      openehr: "$archetype"
    mappingCode: "timingToDaily"
    followedBy:
      mappings:
        - name: "when"
          with:
            fhir: "when.as(Enumeration)"
            openehr: "items[at0039]/items[at0026]"

        - name: "offset"
          with:
            fhir: "offset"
            openehr: "items[at0039]/items[at0040]"

  - name: "asNeeded"
    with:
      fhir: "$fhirRoot.asNeeded.as(Boolean)"
      openehr: "$archetype/items[at0024]"

  - name: "asNeededCode"
    with:
      fhir: "$fhirRoot.asNeeded.as(CodeableConcept)"
      openehr: "$archetype/items[at0025]"


