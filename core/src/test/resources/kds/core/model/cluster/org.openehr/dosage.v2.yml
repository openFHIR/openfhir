grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name:  CLUSTER.dosage.v2
  version: 0.0.1-alpha 
spec: 
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.dosage.v2
    revision: 2.0.2
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Dosage

mappings:
  - name: "dosageInstructionText"
    with:
      fhir: "$fhirRoot.text"
      openehr: "$archetype/items[at0178]"

  - name: "sequence"
    with:
      fhir: "$fhirRoot.sequence"
      openehr: "$archetype/items[at0164]"

  - name: "doseAndRate"
    with:
      fhir: "$fhirRoot.doseAndRate"
      openehr: "$archetype"
    followedBy:
      mappings:
        - name: "doseQuantityValue"
          with:
            fhir: "dose.as(Quantity)"
            openehr: "items[at0144]"
          openehrCondition:
            targetRoot: "$openehrRoot"
            targetAttribute: "items[at0144]"
            operator: "type"
            criteria: "DV_QUANTITY"

        - name: "doseRangeValue"
          with:
            fhir: "dose.as(Range)"
            openehr: "items[at0144]"
          mappingCode: "dosageQuantityToRange"
          openehrCondition:
            targetRoot: "$openehrRoot"
            targetAttribute: "items[at0144]"
            operator: "type"
            criteria: "DV_INTERVAL"

        - name: "rateQuantity"
          with:
            fhir: "rate.as(Quantity)"
            openehr: "items[at0134]"
          openehrCondition:
            targetRoot: "$openehrRoot"
            targetAttribute: "items[at0102]"
            operator: "empty"

        - name: "rateRatio"
          with:
            fhir: "rate.as(Ratio)"
            openehr: "$openehrRoot" # maps at0134 and at0102
          mappingCode: "ratio_to_dosage"
          openehrCondition:
            targetRoot: "$openehrRoot"
            targetAttribute: "items[at0102]"
            operator: "not empty"

        - name: "rateRangeValue"
          with:
            fhir: "rate.as(Range)"
            openehr: "items[at0134]"
          mappingCode: "rangeToText"

  - name: "dosageDailyTiming"
    with:
      fhir: "$fhirRoot"
      openehr: "$archetype/items[openEHR-EHR-CLUSTER.timing_daily.v1]"
    slotArchetype: "CLUSTER.timing_daily.v1"
    fhirCondition:
      targetRoot: "$fhirRoot"
      targetAttribute: "timing.repeat.periodUnit"
      operator: "one of"
      criterias:
        - "s"
        - "min"
        - "h"
        - "d"


  - name: "dosageTimingNonDaily"
    with:
      fhir: "$fhirRoot"
      openehr: "$archetype/items[openEHR-EHR-CLUSTER.timing_nondaily.v1]"
    slotArchetype: "CLUSTER.timing_nondaily.v1"
    fhirCondition:
      targetRoot: "$fhirRoot"
      targetAttribute: "timing.repeat.periodUnit"
      operator: "not of"
      criterias:
        - "s"
        - "min"
        - "h"
        - "d"

  - name: "duration"
    with:
       fhir: "$fhirRoot.timing.repeat"
       openehr: "$archetype/items[at0102]"
    mappingCode: "dosageDurationToAdministrationDuration"
