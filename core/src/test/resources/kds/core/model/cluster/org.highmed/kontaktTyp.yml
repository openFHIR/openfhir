grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name:  CLUSTER.kontakttyp.v0
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.kontakttyp.v0
    revision:  0.0.1-alpha
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/CodeableConcept

mappings:
  - name: "kontaktEbene"
    with:
      fhir: "$fhirRoot.coding"
      openehr: "$archetype/items[at0001]"
    fhirCondition:
      targetRoot: "$fhirRoot.coding"
      targetAttribute: "system"
      operator: "one of"
      criteria: "http://fhir.de/CodeSystem/Kontaktebene"
    followedBy:
      mappings:
        - name: "kontaktEbeneSystem"
          with:
            fhir: "$fhirRoot"
          manual:
            - name: "kontaktEbeneSystem"
              fhir:
                - path: "system"
                  value: "http://fhir.de/CodeSystem/kontaktebene"

  - name: "kontaktArt"
    with:
      fhir: "$fhirRoot.coding"
      openehr: "$archetype/items[at0002]"
    fhirCondition:
      targetRoot: "$fhirRoot.coding"
      targetAttribute: "system"
      operator: "one of"
      criteria: "http://fhir.de/CodeSystem/kontaktart-de"
    followedBy:
      mappings:
        - name: "kontaktArtSystem"
          with:
            fhir: "$fhirRoot"
          manual:
            - name: "kontaktArtSystem"
              fhir:
                - path: "system"
                  value: "http://fhir.de/CodeSystem/kontaktart-de"