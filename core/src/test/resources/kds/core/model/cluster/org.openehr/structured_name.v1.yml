grammar: FHIRConnect/v0.9.0
type: model
metadata:
  name:  CLUSTER.structured_name.v1
  version: 0.0.1-alpha 
spec: 
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.structured_name.v1
    revision: 1.0.1
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/HumanName

mappings:

  - name: "typeOfName"
    with:
      fhir: "$fhirRoot.use"
      openehr: "$archetype/items[at0001]"

  - name: "firstName"
    with:
      fhir: "$fhirRoot.given"
      openehr: "$archetype/items[at0002]"

  - name: "prefix"
    with:
      fhir: "$fhirRoot.prefix"
      openehr: "$archetype/items[at0006]"

  - name: "familyName"
    with:
      fhir: "$fhirRoot.family"
      openehr: "$archetype/items[at0005]"
