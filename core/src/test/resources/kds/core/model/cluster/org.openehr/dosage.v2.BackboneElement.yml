grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name:  CLUSTER.dosage.v2.BackboneElement
  version: 0.0.1-alpha 
spec: 
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.dosage.v2
    revision: 2.0.2
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/BackboneElement

mappings:

  - name: "doseQuantityValue"
    with:
      fhir: "$fhirRoot.dose"
      openehr: "$archetype/items[at0144]"

  - name: "doseDescription"
    with:
      fhir: "$fhirRoot.text"
      openehr: "$archetype/items[at0178]"

  - name: "rateQuantity"
    with:
      fhir: "$fhirRoot.rate.as(Quantity)"
      openehr: "$archetype/items[at0134]"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "items[at0134]"
      operator: "type"
      criteria: "DV_QUANTITY"

  - name: "rateRatio"
    with:
      fhir: "$fhirRoot.rate.as(Ratio)"
      openehr: "$archetype"
    mappingCode: "ratio_to_dosage_action"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "items[at0102]"
      operator: "not empty"
