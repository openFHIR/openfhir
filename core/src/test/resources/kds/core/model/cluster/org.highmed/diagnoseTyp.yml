grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name:  CLUSTER.diagnosetyp.v0
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.diagnosetyp.v0
    revision:  0.0.1-alpha
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/CodeableConcept

mappings:
  - name: "diagnoseRole"
    with:
      fhir: "$fhirRoot.coding"
      openehr: "$archetype/items[at0003]"
    fhirCondition:
      targetRoot: "$fhirRoot.coding"
      targetAttribute: "system"
      operator: "one of"
      criteria: "http://terminology.hl7.org/CodeSystem/diagnosis-role"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "items[at0003]"
      operator: "not empty"
    followedBy:
      mappings:
        - name: "diagnoseRoleSystem"
          with:
            fhir: "$fhirRoot"
          manual:
            - name: "diagnoseRoleSystem"
              fhir:
                - path: "system"
                  value: "http://terminology.hl7.org/CodeSystem/diagnosis-role"

  - name: "diagnoseTyp"
    with:
      fhir: "$fhirRoot.coding"
      openehr: "$archetype/items[at0001]"
    fhirCondition:
      targetRoot: "$fhirRoot.coding"
      targetAttribute: "system"
      operator: "one of"
      criteria: "http://fhir.de/CodeSystem/DiagnoseTyp"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "items[at0001]"
      operator: "not empty"
    followedBy:
      mappings:
        - name: "diagnoseTypSystem"
          with:
            fhir: "$fhirRoot"
          manual:
            - name: "diagnoseTypSystem"
              fhir:
                - path: "system"
                  value: "http://fhir.de/CodeSystem/DiagnoseTyp"

  - name: "diagnoseSubTyp"
    with:
      fhir: "$fhirRoot.coding"
      openehr: "$archetype/items[at0002]"
    fhirCondition:
      targetRoot: "$fhirRoot.coding"
      targetAttribute: "system"
      operator: "one of"
      criteria: "http://fhir.de/CodeSystem/Diagnosesubtyp"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "items[at0002]"
      operator: "not empty"
    followedBy:
      mappings:
        - name: "diagnoseSubTypSystem"
          with:
            fhir: "$fhirRoot"
          manual:
            - name: "diagnoseSubTypSystem"
              fhir:
                - path: "system"
                  value: "http://fhir.de/CodeSystem/Diagnosesubtyp"