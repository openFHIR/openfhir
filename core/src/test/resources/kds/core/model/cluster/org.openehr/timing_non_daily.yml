grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name:  CLUSTER.timing_nondaily.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.timing_nondaily.v1
    revision: 2.0.2
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Dosage

mappings:

  - name: "dosageTiming"
    with:
      fhir: "$fhirRoot.timing.repeat"
      openehr: "$archetype"
    mappingCode: "timingNonDaily"
    followedBy:
      mappings:
        - name: "when"
          with:
            fhir: "when"
            openehr: "items[at0006]/items[at0005]"

        - name: "offset"
          with:
            fhir: "offset"
            openehr: "items[at0006]/items[at0009]"

