        - name: "eventTime"
          with:
            fhir: "effective"
            openehr: "$openehrRoot"

        - name: "categoryLoinc"
          with:
            fhir: "category"
            openehr: "$openehrRoot"
          followedBy:
            mappings:
              - name: "categoryCoding"
                with:
                  fhir: "coding"
                  openehr: "$openehrRoot"
                manual:
                  - name: "laboratoryCategory"
                    fhir:
                      - path: "system"
                        value: "http://loinc.org"
                      - path: "code"
                        value: "26436-6"
                      - path: "text"
                        value: "laboratory"

              - name: "categoryHl7"
                with:
                  fhir: "coding"
                  openehr: "$openehrRoot"
                manual:
                  - name: "laboratoryCategory"
                    fhir:
                      - path: "system"
                        value: "http://terminology.hl7.org/CodeSystem/v2-0074"
                      - path: "code"
                        value: "LAB"
                      - path: "text"
                        value: "laboratory"

              - name: "text"
                with:
                  fhir: "text"
                  openehr: "$openehrRoot"
                manual:
                  - name: "laboratoryCategory"
                    fhir:
                      - path: "$fhirRoot"
                        value: "laboratory"
            
        - name: "code"
          with:
            fhir: "code"
            openehr: "data[at0003]/items[at0005]"

        - name: "status"
