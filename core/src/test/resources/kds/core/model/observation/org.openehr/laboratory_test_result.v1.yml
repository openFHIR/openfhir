                  value: "registered"
              openehrCondition:
                targetRoot: "$openehrRoot"
                targetAttribute: "defining_code/code_string"
                operator: "one of"
                criteria: "at0107"
              openehr:
                - path: "defining_code/terminology_id"
                  value: "local"
                - path: "defining_code/code_string"
                  value: "at0107"
                - path: "value"
                  value: "registered"
              fhirCondition:
                targetRoot: "$fhirRoot"
                targetAttribute: "status"
                operator: "one of"
                criteria: "registered"
            - name: "partial"
