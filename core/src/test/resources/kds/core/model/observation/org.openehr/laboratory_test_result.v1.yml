  - name: "effectivePeriod"
    unidirectional: "fhir->openehr"
    with:
      fhir: "$resource.effective.as(Period)"
      openehr: "$composition"
    followedBy:
      mappings:
        - name: "effectiveEnd"
          with:
            fhir: "end"
            openehr: "context/end_time"


        - name: "effectiveStart"
          with:
            fhir: "start"
            openehr: "context/start_time"


  - name: "effectiveDateTime"
    unidirectional: "fhir->openehr"
    with:
      fhir: "$resource.effective.as(DateTime)"
      openehr: "$composition/context/start_time"

#  - name: "issued"
#    with:
#      fhir: "$resource.issued"
#      openehr: "$archetype/data[at0001]/origin" # TODO cant be back transformed due to still using flat paths, also the flatPath just populates this field with the event time.


  - name: "issued"
    unidirectional: "openehr->fhir"
    with:
      fhir: "$resource.issued"
      openehr: "$composition/context/start_time" # TODO incorrect mapping but its required in FHIR and actual mapping isnt working due to flatPath parsing

  - name: "eventParent"
    with:
      fhir: "$resource"
      openehr: "$archetype/data[at0001]/events[at0002]"
    followedBy:
