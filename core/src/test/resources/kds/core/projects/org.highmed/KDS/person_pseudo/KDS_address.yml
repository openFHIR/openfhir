grammar: FHIRConnect/v0.9.0
type: extension
metadata:
  name: KDS_address_pseudo
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  extends: CLUSTER.address.v1

mappings:
  - name: "streetaddress"
    extension: "overwrite"
    with:
      fhir: "$fhirRoot"
      openehr: "$archetype"
    followedBy:
      mappings:
        - name: "city"
          with:
            fhir: "city"
            openehr: "items[at0002]"

        - name: "postalCode"
          with:
            fhir: "postalCode"
            openehr: "items[at0005]"

        - name: "line"
          with:
            fhir: "line"
            openehr: "items[at0001]"

        - name: "type"
          with:
            fhir: "type"
            openehr: "items[at0010]"
          followedBy:
            mappings:
              - name: "manual"
                with:
                  fhir: "$fhirRoot"
                  openehr: "$openehrRoot"
                manual:
                  - name: "physical"
                    openehr:
                      - path: "defining_code/terminology_id"
                        value: "local"
                      - path: "defining_code/code_string"
                        value: "at0011"
                      - path: "value"
                        value: "Physical"
                    fhirCondition:
                      targetRoot: "$fhirRoot"
                      targetAttribute: "code"
                      operator: "one of"
                      criteria: "physical"

                    fhir:
                      - path: "code"
                        value: "physical"
                    openehrCondition:
                      targetRoot: "$openehrRoot"
                      targetAttribute: "defining_code/code_string"
                      operator: "one of"
                      criteria: "at0011"

                  - name: "postal"
                    openehr:
                      - path: "defining_code/terminology_id"
                        value: "local"
                      - path: "defining_code/code_string"
                        value: "at0012"
                      - path: "value"
                        value: "Postal"
                    fhirCondition:
                      targetRoot: "$fhirRoot"
                      targetAttribute: "code"
                      operator: "one of"
                      criteria: "postal"
                    fhir:
                      - path: "code"
                        value: "postal"
                    openehrCondition:
                      targetRoot: "$openehrRoot"
                      targetAttribute: "defining_code/code_string"
                      operator: "one of"
                      criteria: "at0012"

                  - name: "both"
                    openehr:
                      - path: "defining_code/terminology_id"
                        value: "local"
                      - path: "defining_code/code_string"
                        value: "at0013"
                      - path: "value"
                        value: "Both"
                    fhirCondition:
                      targetRoot: "$fhirRoot"
                      targetAttribute: "code"
                      operator: "one of"
                      criteria: "both"
                    fhir:
                      - path: "code"
                        value: "both"
                    openehrCondition:
                      targetRoot: "$openehrRoot"
                      targetAttribute: "defining_code/code_string"
                      operator: "one of"
                      criteria: "at0013"